<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer wing ring (large arc / tail feathers) - accent blue dim -->
  <path d="M100,100 L20,160 Q10,100 40,50 Z" fill="#22c55e" opacity="0.9"/>
  <!-- Tail fork -->
  <path d="M100,100 L15,175 L35,140 Z" fill="#1a9e4a" opacity="0.85"/>

  <!-- Body arc outer - large blue circle (like pink outer arc) -->
  <circle cx="115" cy="105" r="72" fill="#4f8ef7" opacity="0.22"/>
  <!-- Body arc mid -->
  <circle cx="115" cy="105" r="54" fill="#4f8ef7" opacity="0.28"/>
  <!-- Body arc inner / main body -->
  <circle cx="115" cy="110" r="38" fill="#2563b8" opacity="0.85"/>

  <!-- Head outer ring (dark, like original dark green ring) -->
  <circle cx="138" cy="88" r="32" fill="#0d1117"/>
  <!-- Head inner fill (accent blue, like original green head) -->
  <circle cx="138" cy="88" r="24" fill="#4f8ef7"/>

  <!-- Eye white -->
  <circle cx="143" cy="82" r="8" fill="#ffffff"/>
  <!-- Eye pupil -->
  <circle cx="145" cy="83" r="4.5" fill="#0d1117"/>
  <!-- Eye glint -->
  <circle cx="143" cy="80" r="1.8" fill="#ffffff"/>

  <!-- Beak -->
  <polygon points="162,92 178,98 162,104" fill="#f59e0b"/>
</svg>
