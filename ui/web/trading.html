<!doctype html>
<html lang="en">

<head>
	<title>Wolfinch Trading Bot — Trading</title>
	<link rel="icon" href="https://wolfinch.com/favicon.ico">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
	<link href="stylesheet.css" rel="stylesheet">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

	<script type="text/javascript">
		var exchanges;
		var active_exch = "";
		var active_market = "";
		var buy_paused = false;
		var sell_paused = false;
		var ui_code = "";

		$(document).ready(function () {
			set_ui_code();
			load_exch_data();
		});

		function set_ui_code() {
			var p_l = window.location.pathname.split("/");
			if (p_l.length > 1 && p_l[1] !== "wolfinch" && p_l[1] !== "") {
				ui_code = "/" + p_l[1];
			}
		}

		/* ── Pill-Select Dropdowns ── */
		function toggleMenu(menuId) {
			document.querySelectorAll('.pill-menu').forEach(function (m) {
				if (m.id !== menuId) m.classList.remove('show');
			});
			document.getElementById(menuId).classList.toggle('show');
		}
		document.addEventListener('click', function (e) {
			if (!e.target.closest('.pill-select')) {
				document.querySelectorAll('.pill-menu').forEach(function (m) { m.classList.remove('show'); });
			}
		});

		function exch_onclick(obj) {
			active_exch = this.text;
			document.getElementById("exch_btn_id").textContent = active_exch;
			load_markets_dd();
			document.querySelectorAll('.pill-menu').forEach(function (m) { m.classList.remove('show'); });
		}

		function market_onclick(obj) {
			active_market = this.text;
			document.getElementById("markets_btn_id").textContent = active_market;
			document.querySelectorAll('.pill-menu').forEach(function (m) { m.classList.remove('show'); });

			var data = {};
			data[active_exch] = active_market;
			$.ajax({
				type: 'POST',
				url: ui_code + '/api/set_active_market',
				data: data,
				dataType: 'json',
				success: function (data) {
					exchanges[active_exch].forEach(function (market) {
						if (market["product_id"] == active_market) {
							buy_paused = market["buy_paused"];
							sell_paused = market["sell_paused"];
							syncPauseUI();
						}
					});
				},
				error: function () { console.log("set_active_market failed!"); }
			});
		}

		function syncPauseUI() {
			var buyToggle = document.getElementById("toggle_buy");
			var sellToggle = document.getElementById("toggle_sell");
			if (buyToggle) buyToggle.checked = !buy_paused;
			if (sellToggle) sellToggle.checked = !sell_paused;
		}

		function load_exchanges_dd() {
			var list = document.getElementById("exchangesDdId");
			Object.keys(exchanges).forEach(function (exch_name) {
				var li = document.createElement("li");
				var link = document.createElement("a");
				link.textContent = exch_name;
				link.href = "#";
				link.onclick = exch_onclick;
				li.appendChild(link);
				list.appendChild(li);
			});
			if (active_exch) document.getElementById("exch_btn_id").textContent = active_exch;
		}

		function load_markets_dd() {
			var markets_l = exchanges[active_exch];
			var list = document.getElementById("marketsDdId");
			if (!markets_l) return;
			while (list.firstChild) list.removeChild(list.firstChild);
			markets_l.forEach(function (market) {
				var li = document.createElement("li");
				var link = document.createElement("a");
				link.textContent = market["product_id"];
				link.href = "#";
				link.onclick = market_onclick;
				li.appendChild(link);
				list.appendChild(li);
			});
			if (active_market) {
				var found = markets_l.some(function (m) { return m["product_id"] == active_market; });
				document.getElementById("markets_btn_id").textContent = found ? active_market : "Market";
			}
		}

		function load_exch_data(exch_cb) {
			$.ajax({
				type: 'GET',
				url: ui_code + '/api/get_markets',
				dataType: 'json',
				success: function (data) {
					exchanges = data["all"];
					if (data["active"]) {
						active_exch = data["active"]["EXCH_NAME"];
						active_market = data["active"]["PRODUCT_ID"];
						buy_paused = data["active"]["BUY_PAUSED"];
						sell_paused = data["active"]["SELL_PAUSED"];
					}
					load_exchanges_dd();
					load_markets_dd();
					syncPauseUI();
					if (exch_cb) exch_cb();
				},
				error: function (xhr, error) {
					console.log("get_markets failed!");
					alert(error);
				}
			});
		}

		/* ── Pause Toggle Handler ── */
		function pause_toggle(side) {
			var req_code = document.getElementById("req_code").value;
			if (!req_code) { alert("Please provide passcode!"); syncPauseUI(); return; }
			if (!active_exch || !active_market) { alert("Select exchange and market first!"); syncPauseUI(); return; }

			var action = (side === "buy" ? (buy_paused ? "Resume" : "Pause") : (sell_paused ? "Resume" : "Pause"));
			var txt = action + " " + side + " trading for " + active_exch + ":" + active_market + "?";
			if (!confirm(txt)) { syncPauseUI(); return; }

			if (side === "buy") buy_paused = !buy_paused;
			else sell_paused = !sell_paused;

			$.ajax({
				type: 'POST',
				url: ui_code + '/api/pause_market',
				data: {
					"buy_pause":  (buy_paused)  * 1,
					"sell_pause": (sell_paused) * 1,
					"req_code":   req_code,
					"exch_name":  active_exch,
					"product":    active_market,
				},
				dataType: 'json',
				success: function (resp_data) {
					alert(resp_data);
					if (resp_data !== "success") {
						if (side === "buy") buy_paused = !buy_paused;
						else sell_paused = !sell_paused;
					}
					syncPauseUI();
				},
				error: function (xhr, error) {
					console.log("pause / resume market failed!");
					alert(error);
					if (side === "buy") buy_paused = !buy_paused;
					else sell_paused = !sell_paused;
					syncPauseUI();
				}
			});
		}

		/* ── Manual Order ── */
		function btn_onclick(id) {
			var req_number = document.getElementById("req_number").value;
			var req_code = document.getElementById("req_code").value;
			if (req_number <= 0 || !req_code) { alert("Invalid request!"); return; }
			if (!active_exch || !active_market) { alert("Select exchange and market first!"); return; }

			var cmd = (id === "btn_buy") ? "buy" : "sell";
			if (!confirm(cmd + " " + req_number + " with code '" + req_code + "'?")) return;

			$.ajax({
				type: 'POST',
				url: ui_code + '/api/manual_order',
				data: {
					"cmd": cmd, "req_number": req_number, "req_code": req_code,
					"exch_name": active_exch, "product": active_market,
				},
				dataType: 'json',
				success: function (data) { alert(data); },
				error: function (xhr, error) { alert(error); }
			});
		}

		/* ── Market CRUD (add / delete) ── */
		function btn_mkt_onclick(id) {
			var ticker_id = document.getElementById("ticker_id").value;
			var req_code = document.getElementById("req_code").value;
			if (!ticker_id || !req_code) { alert("Invalid request!"); return; }
			if (!active_exch || !active_market) { alert("Select exchange and market first!"); return; }

			var cmd = (id === "btn_mkt_add") ? "add" : "delete";
			if (!confirm(cmd + " " + ticker_id + " with code '" + req_code + "'?")) return;

			$.ajax({
				type: 'POST',
				url: ui_code + '/api/update_market',
				data: {
					"cmd": cmd, "req_code": req_code,
					"exch_name": active_exch, "product": ticker_id,
				},
				dataType: 'json',
				success: function (data) { alert(data); },
				error: function (xhr, error) { alert(error); }
			});
		}
	</script>
</head>

<body>

	<!-- ── Top Nav ── -->
	<nav class="top-nav">
		<a class="brand-link" href="/wolfinch"><svg class="brand-icon-img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M100,100 L20,160 Q10,100 40,50 Z" fill="#22c55e" opacity="0.9"/><path d="M100,100 L15,175 L35,140 Z" fill="#1a9e4a" opacity="0.85"/><circle cx="115" cy="105" r="72" fill="#4f8ef7" opacity="0.22"/><circle cx="115" cy="105" r="54" fill="#4f8ef7" opacity="0.28"/><circle cx="115" cy="110" r="38" fill="#2563b8" opacity="0.85"/><circle cx="138" cy="88" r="32" fill="#0d1117"/><circle cx="138" cy="88" r="24" fill="#4f8ef7"/><circle cx="143" cy="82" r="8" fill="#ffffff"/><circle cx="145" cy="83" r="4.5" fill="#0d1117"/><circle cx="143" cy="80" r="1.8" fill="#ffffff"/><polygon points="162,92 178,98 162,104" fill="#f59e0b"/></svg> Wolfinch</a>

		<div class="pill-pair">
			<span class="nav-label">Exchange</span>
			<div class="pill-select">
				<div class="pill-select-btn" onclick="toggleMenu('exchangesDdId')">
					<span id="exch_btn_id">—</span>
					<span class="caret">▾</span>
				</div>
				<ul class="pill-menu" id="exchangesDdId"></ul>
			</div>
		</div>

		<div class="pill-pair">
			<span class="nav-label">Market</span>
			<div class="pill-select">
				<div class="pill-select-btn" onclick="toggleMenu('marketsDdId')">
					<span id="markets_btn_id">—</span>
					<span class="caret">▾</span>
				</div>
				<ul class="pill-menu" id="marketsDdId"></ul>
			</div>
		</div>

		<div class="nav-links">
			<a href="../wolfinch">Dashboard</a>
			<a href="chart.html">Charts</a>
			<a href="trading.html" class="active">Trading</a>
		</div>

		<div style="margin-left:auto;">
			<input type="text" class="input" id="req_code" placeholder="Passcode"
				style="width:110px;padding:.25rem .6rem;font-size:.75rem;">
		</div>
	</nav>

	<!-- ── Page Body ── -->
	<div class="page-body" style="max-width:720px;">

		<!-- Manual Trade Card -->
		<div class="card">
			<div class="card-head">
				<span class="card-title"><span class="icon">◉</span> Trade Positions</span>
			</div>
			<div class="form-group mb-2">
				<label for="req_number"># Positions</label>
				<input type="number" class="input" id="req_number" value="1" min="1" max="3"
					style="width:160px;">
			</div>
			<div class="flex gap-sm" style="gap:.65rem;">
				<button class="btn btn--green btn--xl" id="btn_buy"  onclick="btn_onclick(this.id)">BUY</button>
				<button class="btn btn--red   btn--xl" id="btn_sell" onclick="btn_onclick(this.id)">SELL</button>
			</div>
		</div>

		<!-- Pause Auto-Trading Card -->
		<div class="card">
			<div class="card-head">
				<span class="card-title"><span class="icon">⏸</span> Pause Auto Trading</span>
			</div>
			<div class="toggle-row">
				<span class="toggle-label">Buying Active</span>
				<label class="toggle">
					<input type="checkbox" id="toggle_buy" checked onchange="pause_toggle('buy')">
					<span class="slider"></span>
				</label>
			</div>
			<div class="toggle-row">
				<span class="toggle-label">Selling Active</span>
				<label class="toggle">
					<input type="checkbox" id="toggle_sell" checked onchange="pause_toggle('sell')">
					<span class="slider"></span>
				</label>
			</div>
		</div>

		<!-- Market Management Card -->
		<div class="card">
			<div class="card-head">
				<span class="card-title"><span class="icon">◈</span> Market Management</span>
			</div>
			<div class="form-group mb-2">
				<label for="ticker_id">Ticker Symbol</label>
				<input type="text" class="input" id="ticker_id" placeholder="e.g. BTC-USD"
					style="width:200px;">
			</div>
			<div class="flex gap-sm" style="gap:.65rem;">
				<button class="btn btn--accent btn--lg" id="btn_mkt_add" onclick="btn_mkt_onclick(this.id)">Add Market</button>
				<button class="btn btn--outline btn--lg" id="btn_mkt_del" onclick="btn_mkt_onclick(this.id)">Delete Market</button>
			</div>
		</div>

	</div>

	<footer class="footer">© 2017-2025 Wolfinch Bot</footer>
</body>

</html>
